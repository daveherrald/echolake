# Sourcetype Timestamp Registry
# Maps sourcetype -> timestamp extraction patterns
#
# Pattern fields:
#   field:    Dict field name (supports dot notation for nested fields)
#   format:   iso8601 | unix_seconds | unix_millis | auto | strftime pattern
#   regex:    (optional) Regex with capture group to extract value from field
#   is_base:  (optional) Use as base timestamp for delta calculation (default: false)
#
# Fallback chain (highest to lowest priority):
#   1. Explicit timestamp_patterns from config/CLI
#   2. Sourcetype registry lookup (this file)
#   3. Schema default patterns (raw.py 16-pattern list)

# === Windows / Sysmon (XML-parsed -> dict with 'timestamp' from XML parser) ===
XmlWinEventLog:
  - field: timestamp
    format: iso8601
    is_base: true

WinEventLog:
  - field: timestamp
    format: iso8601
    is_base: true

"sysmon:linux":
  - field: timestamp
    format: iso8601
    is_base: true

